name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 openai pyinstaller pillow

      - name: Convert PNG → ICO
        run: |
          python - <<'EOF'
          from PIL import Image
          img = Image.open("icone.png").convert("RGBA")
          img.save("icone.ico", format="ICO",
                   sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          EOF
        shell: bash

      - name: Build with PyInstaller
        run: pyinstaller gpt-image-gen.spec

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Automatic build from the latest commit on `main`.
          prerelease: true
          files: dist/GPT-Image-Generator.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 openai pyinstaller pillow

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "GPT-Image-Generator" \
            --icon icone.png \
            app.py

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r GPT-Image-Generator-macOS.zip "GPT-Image-Generator.app"

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Automatic build from the latest commit on `main`.
          prerelease: true
          files: dist/GPT-Image-Generator-macOS.zip
